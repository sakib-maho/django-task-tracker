{% extends "tasks/base.html" %}

{% block title %}{{ mode }} Task{% endblock %}

{% block body %}
<h1 class="h4 mb-3">{{ mode }} Task</h1>
<form method="post" class="card card-body shadow-sm">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">{{ mode }}</button>
    <a class="btn btn-outline-secondary" href="{% url 'task_list' %}">Cancel</a>
  </div>
</form>
{% endblock %}
